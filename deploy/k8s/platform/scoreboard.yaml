apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoreboard
  namespace: platform
  labels:
    app.kubernetes.io/name: scoreboard
    service: scoreboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scoreboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scoreboard
        service: scoreboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scoreboard
          image: hacktraining/scoreboard:local
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3020
          env:
            - name: PORT
              value: "3020"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scoreboard-db
                  key: DATABASE_URL
            - name: SCOREBOARD_CONFIG
              value: /config/config.yaml
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: scoreboard-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scoreboard
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: scoreboard
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scoreboard
  namespace: platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: scoreboard.hack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scoreboard
                port:
                  number: 80
