apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scoreboard-pg
  namespace: platform
  labels:
    app.kubernetes.io/name: scoreboard-pg
    service: postgres
spec:
  serviceName: scoreboard-pg
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scoreboard-pg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scoreboard-pg
        service: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:17-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              name: pg
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: scoreboard-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scoreboard-db
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: scoreboard-db
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "scoreboard"]
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scoreboard-pg
  namespace: platform
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: scoreboard-pg
  ports:
    - port: 5432
      name: pg
