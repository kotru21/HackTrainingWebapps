apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: platform
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki.platform.svc.cluster.local:3100/loki/api/v1/push
    scrape_configs:
      # Tail pod logs straight off disk. The kubernetes_sd approach produced 0 targets on
      # this k3s node despite correct RBAC and the log files existing at the expected path,
      # so read the files directly (no API/discovery dependency). namespace/pod/container
      # come from the file path; service/team/event/level come from the pino JSON body.
      - job_name: pod-logs
        static_configs:
          - targets: [localhost]
            labels:
              __path__: /var/log/pods/*/*/*.log
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                event: event
                service: service
                team: team
                level: level
          - labels:
              event:
              service:
              team:
              level:
          - regex:
              source: filename
              expression: '^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/'
          - labels:
              namespace:
              pod:
              container:
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hacktraining-promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hacktraining-promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hacktraining-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: platform
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: platform
  labels:
    app.kubernetes.io/name: promtail
    service: promtail
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        service: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.4.2
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
      tolerations:
        - operator: Exists
