# Platform namespace NetworkPolicies — teams cannot reach platform internals
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: platform
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: platform
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-platform
  namespace: platform
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Checker / planter may reach team apps
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-teams
  namespace: platform
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["checker", "flag-planter"]
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              team: a
        - namespaceSelector:
            matchLabels:
              team: b
      ports:
        - protocol: TCP
          port: 3011
        - protocol: TCP
          port: 5432
---
# Team apps may reach internal-metadata (SSRF lab) — ingress side
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-teams-to-metadata
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: internal-metadata
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              team: a
        - namespaceSelector:
            matchLabels:
              team: b
      ports:
        - protocol: TCP
          port: 3099
---
# ingress-nginx → scoreboard / grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: platform
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["scoreboard", "grafana"]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3020
        - protocol: TCP
          port: 3000
