apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-planter
  namespace: platform
  labels:
    app.kubernetes.io/name: flag-planter
    service: flag-planter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flag-planter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flag-planter
        service: flag-planter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: planter
          image: hacktraining/flag-planter:local
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HEALTH_PORT
              value: "3021"
            - name: SCOREBOARD_URL
              value: http://scoreboard.platform.svc.cluster.local
            - name: SCOREBOARD_CONFIG
              value: /config/config.yaml
            - name: STARTUP_DELAY_MS
              value: "30000"
          ports:
            - name: health
              containerPort: 3021
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: scoreboard-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: flag-planter
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: flag-planter
  ports:
    - name: health
      port: 3021
      targetPort: health
