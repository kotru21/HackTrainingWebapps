apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: platform
  labels:
    app.kubernetes.io/name: grafana
    service: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        service: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:13.1.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
          env:
            # INTENTIONALLY WEAK — training only
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.hack.local/
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/attack-timeline.json
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dash-attack
              mountPath: /var/lib/grafana/dashboards/attack-timeline.json
              subPath: attack-timeline.json
            - name: dash-auth
              mountPath: /var/lib/grafana/dashboards/auth-access.json
              subPath: auth-access.json
            - name: dash-inj
              mountPath: /var/lib/grafana/dashboards/injection.json
              subPath: injection.json
            - name: dash-sla
              mountPath: /var/lib/grafana/dashboards/sla-health.json
              subPath: sla-health.json
            - name: dash-flags
              mountPath: /var/lib/grafana/dashboards/flag-submissions.json
              subPath: flag-submissions.json
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: providers
          configMap:
            name: grafana-dashboards-provider
        - name: dash-attack
          configMap:
            name: grafana-dashboard-attack-timeline
        - name: dash-auth
          configMap:
            name: grafana-dashboard-auth-access
        - name: dash-inj
          configMap:
            name: grafana-dashboard-injection
        - name: dash-sla
          configMap:
            name: grafana-dashboard-sla-health
        - name: dash-flags
          configMap:
            name: grafana-dashboard-flag-submissions
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: platform
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: platform
  annotations:
    # TLS via ingress-nginx default cert; force-ssl-redirect needed without tls: block.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.hack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
