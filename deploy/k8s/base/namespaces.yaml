# Base cluster scaffolding — namespaces + PSA (SPEC §8.1 / Phase 6)
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    app.kubernetes.io/part-of: hacktraining
    # privileged enforce: the Alloy DaemonSet mounts hostPath (/var/log/pods) and runs as
    # root to ship pod logs, which the baseline and restricted profiles forbid — so
    # admission must allow it or Alloy never schedules and Loki (hence Grafana) stays
    # empty. Individual platform Deployments still set their own
    # runAsNonRoot + drop-ALL securityContext; audit/warn stay at restricted for visibility.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    name: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-a
  labels:
    app.kubernetes.io/part-of: hacktraining
    team: a
    # baseline — vulnerable stands may violate restricted (V1.8)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
    name: team-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b
  labels:
    app.kubernetes.io/part-of: hacktraining
    team: b
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
    name: team-b
