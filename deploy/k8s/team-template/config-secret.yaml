apiVersion: v1
kind: ConfigMap
metadata:
  name: stand-app-config
  labels:
    app.kubernetes.io/component: app
data:
  PORT: "3011"
  NODE_ENV: "development"
  EXPOSE_DEBUG: "true"
  JWT_COOKIE_NAME: "bill_token"
  # Directory inside the app image that holds the runnable stand source (src, views,
  # node_modules, tsconfig). The seed-workspace initContainer copies this into the
  # per-team workspace PVC on first start; the app then runs that editable copy via
  # `tsx watch`. app1 overlays override this to /app.
  STAND_APP_DIR: "/apps/app2-billing/vulnerable"
  # INTENTIONALLY WEAK — training only (vulnerable overlay)
  SECURITY_HEADERS: "off"
  CORS_ORIGIN: "*"
  CORS_CREDENTIALS: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: stand-app-secret
  labels:
    app.kubernetes.io/component: app
type: Opaque
stringData:
  # INTENTIONALLY WEAK — training only
  JWT_SECRET: billing-secret
  DATABASE_URL: postgres://billing:billing@postgres:5432/billing
  POSTGRES_PASSWORD: billing
  POSTGRES_USER: billing
  POSTGRES_DB: billing
