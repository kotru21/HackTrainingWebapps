# NetworkPolicy — SPEC §3 / .cursor/rules/40-deploy-k8s.mdc
# Attacker namespace is patched per overlay (team label of the opponent).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  labels:
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
# DNS (kube-dns / coredns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Intra-namespace (app ↔ postgres, IDE ↔ workspace tooling)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# App may reach SSRF training target in platform only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-metadata
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: app
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: internal-metadata
      ports:
        - protocol: TCP
          port: 3099
---
# Platform (checker / planter / probes) → app HTTP
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: app
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: platform
      ports:
        - protocol: TCP
          port: 3011
---
# Platform flag-planter → team postgres (plants flags directly into the stand DB).
# WITHOUT this, planting silently fails in-cluster (default-deny blocks platform→pg:5432).
# Attackers never get this path — only the platform namespace is allowed here.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: postgres
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: platform
      ports:
        - protocol: TCP
          port: 5432
---
# Attacking team → app HTTP ONLY (never postgres / code-server)
# Overlay patches matchLabels.team to the attacker team id (a|b).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-attacker-to-app-http
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: app
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              team: ATTACKER_TEAM
      ports:
        - protocol: TCP
          port: 3011
---
# Egress to opponent app HTTP (default-deny would otherwise block attacks)
# Overlay patches OPPONENT_TEAM.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-opponent-app
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              team: OPPONENT_TEAM
          podSelector:
            matchLabels:
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 3011
---
# ingress-nginx → app + code-server (participants / own IDE)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["app", "code-server"]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3011
        - protocol: TCP
          port: 8080
