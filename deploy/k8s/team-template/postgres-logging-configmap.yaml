# ConfigMap fragment — stand postgres logging (SPEC §7.3 / Phase 3).
# Consumed by team-template StatefulSet in Phase 6.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-logging
  labels:
    app.kubernetes.io/part-of: hacktraining
    service: postgres
data:
  postgresql.conf: |
    listen_addresses = '*'
    log_destination = 'stderr'
    logging_collector = off
    log_statement = all
    log_connections = on
    log_disconnections = on
    log_line_prefix = '%m [%p] %u@%d %h '
    log_timezone = 'UTC'
    timezone = 'UTC'
