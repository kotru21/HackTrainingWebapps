apiVersion: v1
kind: ServiceAccount
metadata:
  name: team-operator
  labels:
    app.kubernetes.io/part-of: hacktraining
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-operator
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods", "pods/log", "pods/exec", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: team-operator
subjects:
  - kind: ServiceAccount
    name: team-operator
  - kind: ServiceAccount
    name: team-user
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: team-user
  labels:
    app.kubernetes.io/part-of: hacktraining
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: team-operator
subjects:
  - kind: ServiceAccount
    name: team-user
