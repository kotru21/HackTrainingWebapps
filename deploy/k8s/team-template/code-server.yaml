apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/component: code-server
    service: code-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
      app.kubernetes.io/component: code-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
        app.kubernetes.io/component: code-server
        service: code-server
    spec:
      serviceAccountName: team-operator
      containers:
        - name: code-server
          image: hacktraining/code-server:local
          imagePullPolicy: IfNotPresent
          # --extensions-dir points at the image-baked ESLint/Prettier/GitLens so the
          # code-server-data PVC (settings/state under ~/.local/share/code-server) does
          # not shadow them.
          args:
            - --auth
            - password
            - --bind-addr
            - 0.0.0.0:8080
            - --extensions-dir
            - /opt/hacktraining/extensions
            - /workspace
          ports:
            - name: http
              containerPort: 8080
          env:
            # INTENTIONALLY WEAK — training only
            - name: PASSWORD
              value: team-ide-password
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            # Persist settings/state across pod restarts (XDG data dir). Extensions live
            # in the image at /opt/hacktraining/extensions (see Dockerfile).
            - name: code-server-data
              mountPath: /home/coder/.local/share/code-server
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace
        - name: code-server-data
          persistentVolumeClaim:
            claimName: code-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: code-server
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/component: code-server
spec:
  selector:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/component: code-server
  ports:
    - name: http
      port: 8080
      targetPort: http
