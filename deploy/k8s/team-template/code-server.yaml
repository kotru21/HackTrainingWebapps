apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/component: code-server
    service: code-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
      app.kubernetes.io/component: code-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
        app.kubernetes.io/component: code-server
        service: code-server
    spec:
      serviceAccountName: team-operator
      containers:
        - name: code-server
          image: codercom/code-server:4.96.4
          args: ["--auth", "password", "--bind-addr", "0.0.0.0:8080", "/workspace"]
          ports:
            - name: http
              containerPort: 8080
          env:
            # INTENTIONALLY WEAK — training only
            - name: PASSWORD
              value: team-ide-password
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace
---
apiVersion: v1
kind: Service
metadata:
  name: code-server
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/component: code-server
spec:
  selector:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/component: code-server
  ports:
    - name: http
      port: 8080
      targetPort: http
