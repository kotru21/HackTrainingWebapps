apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace
  labels:
    app.kubernetes.io/component: workspace
spec:
  accessModes: ["ReadWriteOnce"]
  # Omit storageClassName → cluster default (k3s local-path / kind standard)
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  labels:
    app.kubernetes.io/component: postgres
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-data
  labels:
    app.kubernetes.io/component: code-server
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
