apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stand
  labels:
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # TLS terminates via ingress-nginx --default-ssl-certificate (hack-local-tls); no
    # per-Ingress tls: block. force-ssl-redirect is required for HTTP→HTTPS without tls:.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # code-server (IDE host) loads its editor over a long-lived WebSocket. The default
    # ingress-nginx read/send timeout (60s) drops that connection, so the IDE authenticates
    # but then renders a blank page. Raise the timeouts so the workbench stays connected.
    # WebSocket upgrade itself is handled automatically by ingress-nginx.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: TEAM_HOST_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 80
    - host: TEAM_IDE_HOST_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: code-server
                port:
                  number: 8080
