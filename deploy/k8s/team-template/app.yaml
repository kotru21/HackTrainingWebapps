apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: stand-app
    app.kubernetes.io/component: app
    service: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stand-app
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stand-app
        app.kubernetes.io/component: app
        service: app
    spec:
      initContainers:
        # Seed the per-team workspace PVC from the image baseline on first start (empty
        # PVC only — never clobbers a team's in-progress edits). The app then runs this
        # editable copy, so fixes made in code-server take effect. reset-round wipes the
        # PVC, so the next start re-seeds a clean vulnerable baseline (SPEC §8.3).
        # Uses the same image as the app container, so kustomize's image transformer
        # swaps it to the app1 image on app1 overlays automatically.
        - name: seed-workspace
          image: hacktraining/app2-billing-vulnerable:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ -z "$(ls -A /workspace 2>/dev/null)" ]; then
                echo "seeding workspace from ${STAND_APP_DIR}"
                cp -a "${STAND_APP_DIR}/." /workspace/
                # Make the workspace self-sufficient for the code-server TS language server.
                # The stand's out-of-tree deps (tsconfig.base.json, @hacktraining/shared)
                # live at the image root, outside STAND_APP_DIR, so the IDE alone can't
                # resolve them — causing esModuleInterop / 'cannot find module' errors.
                # Editor-only: the running app resolves these fine from the image root.
                if [ -d /packages/shared ]; then
                  rm -rf /workspace/node_modules/@hacktraining/shared
                  mkdir -p /workspace/node_modules/@hacktraining
                  cp -a /packages/shared/. /workspace/node_modules/@hacktraining/shared/
                fi
                if [ -f /tsconfig.base.json ] && [ -f /workspace/tsconfig.json ]; then
                  cp -a /tsconfig.base.json /workspace/tsconfig.base.json
                  node -e "const f='/workspace/tsconfig.json';const t=require(f);t.extends='./tsconfig.base.json';delete t.references;require('fs').writeFileSync(f,JSON.stringify(t,null,2))" 2>/dev/null || true
                fi
                # The app image runs as root, so the seeded files are root-owned; code-server
                # runs as uid 1000 (coder) and could not save edits (EACCES). Make the tree
                # writable so the defender can edit source and .env in the IDE.
                chmod -R a+rwX /workspace 2>/dev/null || true
                echo "workspace seeded"
              else
                echo "workspace not empty — keeping existing team edits"
              fi
          envFrom:
            - configMapRef:
                name: stand-app-config
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: app
          # Overlays replace this image (vuln vs ref)
          image: hacktraining/app2-billing-vulnerable:local
          imagePullPolicy: IfNotPresent
          # Run the editable workspace copy directly with tsx watch: edits saved in
          # code-server restart the server in-process (no rebuild). Overrides the image
          # CMD (`node dist/index.js`), which would otherwise run the baked, read-only build.
          workingDir: /workspace
          command: ["sh", "-c", "exec node_modules/.bin/tsx watch src/index.ts"]
          ports:
            - name: http
              containerPort: 3011
          envFrom:
            - configMapRef:
                name: stand-app-config
            - secretRef:
                name: stand-app-secret
          env:
            - name: TEAM
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: flags
              mountPath: /flags
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace
        - name: flags
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    app.kubernetes.io/name: stand-app
    app.kubernetes.io/component: app
spec:
  selector:
    app.kubernetes.io/name: stand-app
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: http
