apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: stand-app
    app.kubernetes.io/component: app
    service: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stand-app
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stand-app
        app.kubernetes.io/component: app
        service: app
    spec:
      containers:
        - name: app
          # Overlays replace this image (vuln vs ref)
          image: hacktraining/app2-billing-vulnerable:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3011
          envFrom:
            - configMapRef:
                name: stand-app-config
            - secretRef:
                name: stand-app-secret
          env:
            - name: TEAM
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: flags
              mountPath: /flags
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace
        - name: flags
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    app.kubernetes.io/name: stand-app
    app.kubernetes.io/component: app
spec:
  selector:
    app.kubernetes.io/name: stand-app
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: http
