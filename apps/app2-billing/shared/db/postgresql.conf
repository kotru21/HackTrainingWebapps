# Shared stand PostgreSQL logging for app2 (SPEC §7.3).
# Applied as ConfigMap in deploy/k8s/team-template (Phase 6).
listen_addresses = '*'
log_destination = 'stderr'
logging_collector = off
log_statement = all
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %u@%d %h '
log_timezone = 'UTC'
timezone = 'UTC'
