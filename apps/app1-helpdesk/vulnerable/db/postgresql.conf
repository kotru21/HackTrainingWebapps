# Stand PostgreSQL logging (SPEC §7.3) — mount via ConfigMap on team postgres pods.
# Enables SQLi forensics: exact injected statements appear in postgres container logs.

listen_addresses = '*'
log_destination = 'stderr'
logging_collector = off
log_statement = all
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %u@%d %h '
log_timezone = 'UTC'
timezone = 'UTC'
