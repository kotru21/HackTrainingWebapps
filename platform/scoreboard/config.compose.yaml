# Scoring config for docker compose network (docs/scoring.md)
# INTENTIONALLY WEAK — training only
tick_seconds: 60
flag_ttl_ticks: 3
defense_weight: 500
first_blood_multiplier: 1.5
submit_rate_limit_per_min: 20
round_minutes: 90
flag_regex: 'TRN\{[0-9a-f]{32}\}'

team_tokens:
  a: team-a-token
  b: team-b-token
judge_token: judge-token

flag_values:
  A01-IDOR: 100
  A04-MASSASSIGN: 120
  CFG-JWT: 300
  CFG-RCE: 300
  CFG-LEAK: 150
  CFG-CREDS: 120
  A02-CRYPTO: 150
  A03-XSS: 150
  A03-SQLI: 200
  A10-SSRF: 200

stands:
  - team: a
    service: app2-billing
    base_url: http://app2-billing-vuln:3011
    database_url: postgres://billing:billing@billing-pg:5432/billing_vuln
    kind: billing
  - team: b
    service: app2-billing
    base_url: http://app2-billing-ref:3012
    database_url: postgres://billing:billing@billing-pg:5432/billing_ref
    kind: billing

metadata_url: http://internal-metadata:3099
metadata_plant_token: metadata-plant-token
