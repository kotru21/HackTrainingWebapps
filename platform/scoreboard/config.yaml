# Scoring defaults — judge can edit without rebuild (docs/scoring.md §7)
tick_seconds: 60
flag_ttl_ticks: 3
defense_weight: 500
first_blood_multiplier: 1.5
submit_rate_limit_per_min: 20
round_minutes: 90
flag_regex: 'TRN\{[0-9a-f]{32}\}'

# INTENTIONALLY WEAK — training only (bootstrap issues real tokens in prod)
team_tokens:
  a: team-a-token
  b: team-b-token
judge_token: judge-token

flag_values:
  A01-IDOR: 100
  A04-MASSASSIGN: 120
  CFG-JWT: 300
  CFG-RCE: 300
  CFG-LEAK: 150
  A02-CRYPTO: 150
  A03-XSS: 150
  A03-SQLI: 200
  A10-SSRF: 200

# Stands the planter/checker target (local Phase 4 defaults)
stands:
  - team: a
    service: app2-billing
    base_url: http://127.0.0.1:3011
    database_url: postgres://billing:billing@127.0.0.1:5434/billing_vuln
    kind: billing
  - team: b
    service: app2-billing
    base_url: http://127.0.0.1:3012
    database_url: postgres://billing:billing@127.0.0.1:5434/billing_ref
    kind: billing

metadata_url: http://127.0.0.1:3099
metadata_plant_token: metadata-plant-token
